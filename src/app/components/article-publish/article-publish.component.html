<section class="p-8">
    <h1 class="text-3xl font-bold mb-6">Publicar Artículo</h1>
    <form (ngSubmit)="publishArticle()" class="space-y-4">
      <div>
        <label for="title" class="block text-gray-700 font-medium">Título</label>
        <input
          id="title"
          type="text"
          [(ngModel)]="title"
          name="title"
          class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>
      <div>
        <label for="content" class="block text-gray-700 font-medium">Contenido</label>
        <textarea
          id="content"
          [(ngModel)]="content"
          name="content"
          class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          rows="5"
          required
        ></textarea>
      </div>
      <button
        type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500"
      >
        Publicar
      </button>
    </form>
  </section>
