<div class="flex justify-center items-center min-h-screen bg-gray-100">
    <div class="bg-white p-6 shadow rounded w-96">
      <h1 class="text-2xl font-bold text-center text-gray-800">Admin Login</h1>
      <form (ngSubmit)="login()" class="mt-6">
        <label for="password" class="block text-gray-700">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" 
               class="w-full mt-2 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        <button type="submit" 
                class="w-full bg-blue-600 text-white mt-4 py-2 rounded hover:bg-blue-500">Iniciar Sesión</button>
      </form>
    </div>
  </div>
